<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - Mini Dungeon Quest</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Georgia, "Times New Roman", serif;
        color: #f2f7ff;
        background: #0e1f33;
      }
      .card {
        width: min(90vw, 420px);
        padding: 20px;
        border-radius: 12px;

  <body>
    <div class="card">
      <h1>You are offline</h1>
      <p>Reconnect to continue your adventure.</p>
    </div>
  </body>
</html>
