<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#16324f" />
    <meta name="description" content="A tiny dungeon-themed PWA demo." />
    <link rel="manifest" href="./site.webmanifest" />
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml" />
    <title>Mini Dungeon Quest</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Mini Dungeon Quest</h1>
      <p class="subtitle">A tiny web game ready for TWA packaging.</p>

      <section class="card">
        <p>Depth: <strong id="depth">1</strong></p>
        <p>HP: <strong id="hp">20</strong></p>
        <p>Gold: <strong id="gold">0</strong></p>
        <p>Last event: <strong id="event">You enter the dungeon.</strong></p>
      </section>

      <section class="actions">
        <button id="exploreBtn">Explore</button>
        <button id="restBtn">Rest</button>
        <button id="resetBtn">New Run</button>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
